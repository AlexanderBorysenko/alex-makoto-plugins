<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PCE Viewer</title>
<style>
  :root{
    --bg:#0d1320; --panel:#141c2c; --panel2:#1a2438; --line:#26324a;
    --text:#d9e1ef; --dim:#8b98b0; --faint:#5b6880;
    --accent:#f2a93b; --add:#4cc38a; --mod:#e6b84c; --rem:#e5654f;
    --k-controller:#8f7bf0; --k-service:#4f8ef7; --k-gateway:#3fbdbd;
    --k-repo:#7d8aa5; --k-queue:#e08a4c; --k-consumer:#c9a24f; --k-internal:#6f7f9d;
    --k-db_trigger:#c96b6b; --k-scheduled_job:#b06bc9; --k-external_system:#b06bc9;
    --mono:ui-monospace,"JetBrains Mono","Cascadia Code",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}
  .app{display:grid;grid-template-columns:290px 1fr 350px;grid-template-rows:52px 1fr;height:100vh}
  header{grid-column:1/4;display:flex;align-items:center;gap:14px;padding:0 18px;border-bottom:1px solid var(--line);background:var(--panel)}
  header .logo{font-family:var(--mono);font-size:13px;letter-spacing:.08em;color:var(--accent)}
  header .title{font-size:13px;color:var(--dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:46vw}
  header .stamp{font-family:var(--mono);font-size:10px;color:var(--faint)}
  header .spacer{flex:1}
  .toggle{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--dim);cursor:pointer;user-select:none;font-family:var(--mono)}
  .toggle .sw{width:34px;height:18px;border-radius:9px;background:var(--panel2);border:1px solid var(--line);position:relative;transition:.2s}
  .toggle .sw::after{content:"";position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:var(--faint);transition:.2s}
  .toggle.on .sw{background:#2b3a26;border-color:var(--add)}
  .toggle.on .sw::after{left:18px;background:var(--add)}
  .toggle.heat.on .sw{background:#3a2a26;border-color:var(--rem)}
  .toggle.heat.on .sw::after{background:var(--rem)}
  aside{border-right:1px solid var(--line);background:var(--panel);overflow-y:auto;padding:14px}
  aside h2,.rightpanel h2{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--faint);margin:14px 0 8px}
  aside h2:first-child{margin-top:0}
  .flow{border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:8px;cursor:pointer;background:var(--panel2)}
  .flow:hover{border-color:var(--faint)}
  .flow.active{border-color:var(--accent)}
  .flow .name{font-size:13px;font-weight:600}
  .flow .kindtag{font-family:var(--mono);font-size:10px;margin-top:4px;color:var(--dim)}
  .flow.bug .kindtag{color:var(--rem)}
  .flowdesc{font-size:12px;color:var(--dim);line-height:1.5;margin:6px 0 10px}
  .btnrow{display:flex;gap:6px;flex-wrap:wrap}
  button{font-family:var(--mono);font-size:11px;padding:6px 10px;border-radius:6px;border:1px solid var(--line);background:var(--panel2);color:var(--text);cursor:pointer}
  button:hover{border-color:var(--accent);color:var(--accent)}
  button:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
  button.primary{border-color:var(--accent);color:var(--accent)}
  button:disabled{opacity:.4;cursor:default}
  .bb-list .bb{border:1px dashed var(--faint);border-radius:8px;padding:8px 10px;margin-bottom:6px;cursor:pointer}
  .bb-list .bb:hover{border-color:var(--rem)}
  .bb-list .bb .t{font-family:var(--mono);font-size:11px;color:var(--rem)}
  .bb-list .bb .e{font-size:11px;color:var(--dim);margin-top:3px;line-height:1.4}
  .hint{font-family:var(--mono);font-size:10px;color:var(--faint);margin-top:12px;line-height:1.6;border-top:1px dashed var(--line);padding-top:10px}
  .canvaswrap{position:relative;overflow:hidden;display:flex;flex-direction:column;background:radial-gradient(circle at 30% 20%, #101a2c 0%, var(--bg) 60%)}
  .viewtabs{display:flex;gap:2px;padding:8px 12px 0;flex:none;align-items:flex-end}
  .vtab{font-family:var(--mono);font-size:11px;letter-spacing:.06em;padding:7px 16px;border:1px solid var(--line);border-bottom:none;border-radius:8px 8px 0 0;background:transparent;color:var(--dim);cursor:pointer}
  .vtab.active{background:var(--panel2);color:var(--accent);border-color:var(--accent)}
  .vtab:disabled{opacity:.35;cursor:default}
  .zoomctl{margin-left:auto;display:flex;gap:4px;padding-bottom:4px}
  .viewbody{flex:1;position:relative;border-top:1px solid var(--line);overflow:hidden}
  .viewpane{position:absolute;inset:0;display:none}
  .viewpane.active{display:block}
  svg{display:block}
  #svgMap{width:100%;height:100%;cursor:grab} #svgMap.panning{cursor:grabbing}
  #seqScroll{position:absolute;inset:0;overflow:auto}
  .node rect.body{fill:var(--panel2);stroke:var(--line);stroke-width:1.2;rx:9}
  .node:hover rect.body{stroke:var(--dim)}
  .node.selected rect.body{stroke:var(--accent);stroke-width:1.6}
  .node.lit rect.body{stroke:var(--accent);stroke-width:2;filter:drop-shadow(0 0 6px rgba(242,169,59,.45))}
  .node.dim{opacity:.28}
  .node.suspected rect.body{stroke:var(--faint);stroke-dasharray:4 4;fill:#151a26}
  .node.suspected text.label{fill:var(--dim);font-style:italic}
  .node text.label{fill:var(--text);font-size:13px;font-weight:600}
  .node text.kind{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em}
  .node text.nid,.edge text.eid{fill:var(--faint);opacity:.55;font-family:var(--mono);font-size:9px}
  .node.diff-add rect.body{stroke:var(--add);stroke-dasharray:5 3}
  .node.diff-mod rect.body{stroke:var(--mod)}
  .difftag{font-family:var(--mono);font-size:9px}
  .expander{cursor:pointer}
  .expander circle{fill:var(--panel);stroke:var(--faint)}
  .expander:hover circle{stroke:var(--accent)}
  .expander text{fill:var(--dim);font-size:12px;font-family:var(--mono)}
  .edge{cursor:pointer}
  .edge path.vis{fill:none;stroke:#3a4a68;stroke-width:1.5}
  .edge path.hit{fill:none;stroke:transparent;stroke-width:14}
  .edge.async path.vis{stroke-dasharray:6 4}
  .edge.suspect path.vis{stroke:var(--faint);stroke-dasharray:2 5}
  .edge.suspect text{fill:var(--faint);font-style:italic}
  .edge text{fill:var(--faint);font-family:var(--mono);font-size:9.5px}
  .edge.lit path.vis{stroke:var(--accent);stroke-width:2.4;stroke-dasharray:8 6;animation:signal .7s linear infinite}
  .edge.lit text{fill:var(--accent)}
  .edge.dim{opacity:.22}
  .edge.diff-add path.vis{stroke:var(--add);stroke-dasharray:5 3}
  .edge.diff-add text{fill:var(--add)}
  @keyframes signal{to{stroke-dashoffset:-14}}
  @media (prefers-reduced-motion: reduce){.edge.lit path.vis{animation:none}}
  .groupframe{fill:rgba(79,142,247,.06);stroke:var(--k-service);stroke-dasharray:3 4;stroke-width:1.2;rx:12}
  .groupframe.lit{stroke:var(--accent)}
  .groupframe-label{font-family:var(--mono);font-size:10.5px;fill:var(--k-service);letter-spacing:.1em;cursor:pointer}
  .groupframe-id{fill:var(--faint);opacity:.55;font-family:var(--mono);font-size:9px}
  .collapse{cursor:pointer;font-family:var(--mono);font-size:11px;fill:var(--dim)}
  .collapse:hover{fill:var(--accent)}
  .ll-head rect{fill:var(--panel2);stroke:var(--line);rx:7}
  .ll-head.lit rect{stroke:var(--accent)}
  .ll-head text.llname{fill:var(--text);font-size:11.5px;font-weight:600}
  .ll-head text.llid{fill:var(--faint);opacity:.6;font-family:var(--mono);font-size:9px}
  .ll-head{cursor:pointer}
  .lifeline{stroke:var(--line);stroke-width:1;stroke-dasharray:2 4}
  .actbar{fill:#22304a;stroke:#3a4a68;stroke-width:1}
  .actbar.lit{fill:rgba(242,169,59,.22);stroke:var(--accent)}
  .sarrow{cursor:pointer}
  .sarrow line{stroke:#5f7396;stroke-width:1.5}
  .sarrow.return line{stroke-dasharray:5 4}
  .sarrow.async line{stroke-dasharray:2 3;stroke:#8a6a3e}
  .sarrow text{fill:var(--dim);font-family:var(--mono);font-size:10px}
  .sarrow text.err{fill:var(--rem)}
  .sarrow.done line{stroke:#7f92b5}
  .sarrow.lit line{stroke:var(--accent);stroke-width:2.4}
  .sarrow.lit text{fill:var(--accent)}
  .sarrow.future{opacity:.18}
  .sarrow.ghost{opacity:.5}
  .sarrow.ghost line{stroke:var(--rem);stroke-dasharray:3 3}
  .sarrow.ghost text{fill:var(--rem);text-decoration:line-through}
  .sarrow:hover text{fill:var(--text)}
  .stepband{fill:rgba(242,169,59,.05)}
  .ghostnote{fill:var(--rem);font-family:var(--mono);font-size:9px}
  .playbar{position:absolute;left:50%;transform:translateX(-50%);bottom:14px;width:min(680px,94%);background:rgba(20,28,44,.95);border:1px solid var(--line);border-radius:10px;padding:12px 14px;backdrop-filter:blur(4px);display:none;z-index:5}
  .playbar.show{display:block}
  .playbar .stepline{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px}
  .playbar .seq{font-family:var(--mono);font-size:11px;color:var(--accent);white-space:nowrap;padding-top:2px}
  .playbar .expl{font-size:13px;line-height:1.5}
  .playbar .coderef{font-family:var(--mono);font-size:10.5px;color:var(--k-gateway);cursor:pointer;text-decoration:underline dotted}
  .playbar .controls{display:flex;gap:6px;align-items:center}
  .playbar .dots{flex:1;display:flex;gap:4px}
  .playbar .dot{height:3px;flex:1;background:var(--line);border-radius:2px}
  .playbar .dot.done{background:var(--accent)}
  .rightpanel{border-left:1px solid var(--line);background:var(--panel);overflow-y:auto;padding:14px}
  .np-kind{font-family:var(--mono);font-size:10px;letter-spacing:.1em;padding:2px 7px;border-radius:4px;display:inline-block;margin-bottom:8px}
  .np-id{font-family:var(--mono);font-size:10px;color:var(--faint);margin-left:8px}
  .np-title{font-size:16px;font-weight:700;margin-bottom:6px}
  .np-sum{font-size:12.5px;color:var(--dim);line-height:1.55;margin-bottom:12px}
  .np-ev{font-size:11.5px;color:var(--rem);line-height:1.5;margin-bottom:10px;border-left:2px solid var(--rem);padding-left:8px}
  .metrics{font-family:var(--mono);font-size:10.5px;color:var(--dim);line-height:1.8;margin-bottom:8px}
  .refitem,.xnav{font-family:var(--mono);font-size:11px;cursor:pointer;padding:5px 8px;border:1px solid var(--line);border-radius:6px;margin-bottom:6px;word-break:break-all}
  .refitem{color:var(--k-gateway)} .refitem:hover{border-color:var(--k-gateway)}
  .xnav{color:var(--accent)} .xnav:hover{border-color:var(--accent)}
  pre.code{font-family:var(--mono);font-size:11px;line-height:1.55;background:#0a0f1a;border:1px solid var(--line);border-radius:8px;padding:12px;overflow-x:auto;color:#c3cee3;margin-top:8px}
  pre.code .hl{background:rgba(242,169,59,.14);display:block;margin:0 -12px;padding:0 12px;border-left:2px solid var(--accent)}
  .empty{color:var(--faint);font-size:12px;line-height:1.6;margin-top:8px}
  .diffcard{border:1px solid var(--line);border-left:3px solid var(--add);border-radius:6px;padding:9px 11px;margin-bottom:8px}
  .diffcard.mod{border-left-color:var(--mod)}
  .diffcard .op{font-family:var(--mono);font-size:10px;color:var(--add)}
  .diffcard.mod .op{color:var(--mod)}
  .diffcard .rat{font-size:12px;color:var(--dim);line-height:1.5;margin-top:4px}
  .loaderr{padding:40px;color:var(--rem);font-family:var(--mono);font-size:13px;line-height:1.8}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">◇ PCE</div>
    <div class="title" id="metaTitle">loading…</div>
    <div class="stamp" id="metaStamp"></div>
    <div class="spacer"></div>
    <div class="toggle heat" id="heatToggle" role="switch" aria-checked="false" tabindex="0"><span>heat</span><span class="sw"></span></div>
    <div class="toggle" id="diffToggle" role="switch" aria-checked="false" tabindex="0"><span>diff</span><span class="sw"></span></div>
  </header>

  <aside>
    <h2>Flows</h2>
    <div id="flowList"></div>
    <div id="flowDetail"></div>
    <h2 id="bbHead" style="display:none">⚠ Black boxes (perimeter)</h2>
    <div class="bb-list" id="bbList"></div>
    <div class="hint" id="hintBox"></div>
  </aside>

  <div class="canvaswrap">
    <div class="viewtabs">
      <button class="vtab active" id="tabMap">⬡ MAP · structure</button>
      <button class="vtab" id="tabSeq" disabled>⇅ SEQUENCE · flow</button>
      <div class="zoomctl" id="seqZoomCtl" style="display:none">
        <button id="zOut">−</button><button id="zIn">+</button><button id="zReset">1:1</button>
      </div>
    </div>
    <div class="viewbody">
      <div class="viewpane active" id="paneMap">
        <svg id="svgMap" viewBox="0 0 1420 780">
          <defs>
            <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#3a4a68"/></marker>
            <marker id="arrLit" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#f2a93b"/></marker>
            <marker id="arrAdd" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 0 L10 5 L0 10 z" fill="#4cc38a"/></marker>
          </defs>
          <g id="worldMap"></g>
        </svg>
      </div>
      <div class="viewpane" id="paneSeq"><div id="seqScroll"><svg id="svgSeq"></svg></div></div>
      <div class="playbar" id="playbar">
        <div class="stepline">
          <span class="seq" id="pbSeq"></span>
          <div><div class="expl" id="pbExpl"></div><span class="coderef" id="pbRef"></span></div>
        </div>
        <div class="controls">
          <button id="pbPrev">◀ prev</button>
          <button id="pbNext" class="primary">next ▶</button>
          <button id="pbAuto">▶ auto</button>
          <div class="dots" id="pbDots"></div>
          <button id="pbClose">✕</button>
        </div>
      </div>
    </div>
  </div>

  <div class="rightpanel" id="rightpanel">
    <h2>Inspector</h2>
    <div class="empty">Клікни ноду/lifeline/ребро. Black boxes — у сайдбарі зліва.</div>
  </div>
</div>

<script>
/* ============ load map by ?map=<hash> ============ */
let DOC=null;
const KIND_COLOR=k=>({controller:"var(--k-controller)",service:"var(--k-service)",gateway:"var(--k-gateway)",repo:"var(--k-repo)",queue:"var(--k-queue)",consumer:"var(--k-consumer)",internal:"var(--k-internal)",db_trigger:"var(--k-db_trigger)",scheduled_job:"var(--k-scheduled_job)",external_system:"var(--k-external_system)"}[k]||"var(--faint)");
const state={view:"map",diff:false,heat:false,expanded:{},selected:null,flow:null,step:-1,auto:null,seqZoom:1};
const NS="http://www.w3.org/2000/svg";
function el(tag,attrs,text){const e=document.createElementNS(NS,tag);for(const k in attrs)e.setAttribute(k,attrs[k]);if(text!==undefined)e.textContent=text;return e;}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;");}

async function boot(){
  const hash=new URLSearchParams(location.search).get("map")||"example";
  try{
    const r=await fetch(`maps/${hash}.json`);
    if(!r.ok) throw new Error(r.status);
    DOC=await r.json();
  }catch(e){
    document.getElementById("paneMap").innerHTML=
      `<div class="loaderr">Не вдалось завантажити maps/${esc(hash)}.json (${esc(e.message)}).<br>
       Зареєструй мапу: node register-map.mjs &lt;file&gt; → відкрий /?map=&lt;hash&gt;<br>
       Або відкрий приклад: <a href="?map=example" style="color:var(--accent)">/?map=example</a></div>`;
    return;
  }
  init();
}

/* ============ helpers over DOC ============ */
function nodeById(id){
  const b=DOC.nodes.find(n=>n.id===id); if(b)return b;
  if(state.diff&&DOC.diffs){const d=DOC.diffs.find(d=>d.op==="add_node"&&d.node.id===id);if(d)return d.node;}
  for(const k in (DOC.expanded_children||{})){const c=DOC.expanded_children[k].nodes.find(n=>n.id===id);if(c)return c;}
  return null;
}
function stepEdges(st){return[...new Set((st.arrows||[]).map(a=>a.edge).filter(Boolean))];}
function stepNodes(st){const s=new Set();(st.arrows||[]).forEach(a=>{s.add(a.from);s.add(a.to);});return[...s];}
function isExpanded(id){return !!state.expanded[id];}
function portTargets(edgeId,nodeId){
  const g=(DOC.expanded_children||{})[nodeId];
  if(!g||!g.port_map)return null;
  let t=g.port_map[edgeId];
  if(!t)return g.nodes.length?[g.nodes[0].id]:null;
  return Array.isArray(t)?t:[t];
}
function resolveEndpoints(e){
  const froms=isExpanded(e.from)?(portTargets(e.id,e.from)||[e.from]):[e.from];
  const tos=isExpanded(e.to)?(portTargets(e.id,e.to)||[e.to]):[e.to];
  const pairs=[];froms.forEach(f=>tos.forEach(t=>pairs.push([nodeById(f),nodeById(t)])));
  return pairs.filter(p=>p[0]&&p[1]);
}
function visibleNodes(){
  let ns=DOC.nodes.filter(n=>!isExpanded(n.id)&&n.resolution!=="dismissed");
  if(state.diff&&DOC.diffs)ns=ns.concat(DOC.diffs.filter(d=>d.op==="add_node").map(d=>d.node));
  return ns;
}
function visibleEdges(){
  let es=[...DOC.edges];
  if(state.diff&&DOC.diffs)es=es.concat(DOC.diffs.filter(d=>d.op==="add_edge").map(d=>d.edge));
  return es;
}
function modifiedIds(){return state.diff&&DOC.diffs?DOC.diffs.filter(d=>d.op==="modify_node").map(d=>d.target):[];}
function addedNodeIds(){return state.diff&&DOC.diffs?DOC.diffs.filter(d=>d.op==="add_node").map(d=>d.node.id):[];}
function addedEdgeIds(){return state.diff&&DOC.diffs?DOC.diffs.filter(d=>d.op==="add_edge").map(d=>d.edge.id):[];}
function flowDiffFor(flowId){return state.diff&&DOC.flow_diffs?DOC.flow_diffs.find(fd=>fd.flow_id===flowId):null;}
function heatColor(s){ // 0..1 -> green..red
  const h=(1-Math.min(1,Math.max(0,s)))*120;
  return `hsl(${h} 65% 55%)`;
}

/* ============ MAP ============ */
const worldMap=document.getElementById("worldMap"),svgMap=document.getElementById("svgMap");
const NODE_W=195,NODE_H=54,IN_W=150,IN_H=40;
function dims(n){return n.kind==="internal"?[IN_W,IN_H]:[NODE_W,NODE_H];}
function edgePath(a,b,aw,ah,bw,bh){
  const ax=a.pos.x+aw/2,ay=a.pos.y+ah/2,bx=b.pos.x+bw/2,by=b.pos.y+bh/2;
  if(Math.abs(bx-ax)>=Math.abs(by-ay)){
    const x1=ax+(bx>ax?aw/2:-aw/2),x2=bx+(bx>ax?-bw/2:bw/2),mx=(x1+x2)/2;
    return{d:`M${x1} ${ay} C ${mx} ${ay}, ${mx} ${by}, ${x2} ${by}`,mx,my:(ay+by)/2};
  }else{
    const y1=ay+(by>ay?ah/2:-ah/2),y2=by+(by>ay?-bh/2:bh/2),my=(y1+y2)/2;
    return{d:`M${ax} ${y1} C ${ax} ${my}, ${bx} ${my}, ${bx} ${y2}`,mx:(ax+bx)/2,my};
  }
}
function renderMap(){
  worldMap.innerHTML="";
  const litNodes=new Set(),litEdges=new Set();let dimming=false;
  if(state.flow&&state.step>=0){dimming=true;const st=state.flow.steps[state.step];
    stepNodes(st).forEach(id=>litNodes.add(id));stepEdges(st).forEach(id=>litEdges.add(id));}
  const mods=modifiedIds(),addsN=addedNodeIds(),addsE=addedEdgeIds();

  for(const pid in state.expanded){
    if(!state.expanded[pid])continue;
    const g=(DOC.expanded_children||{})[pid];if(!g)continue;
    const f=g.frame||{x:100,y:100,w:300,h:300},parent=nodeById(pid);
    worldMap.appendChild(el("rect",{class:"groupframe"+(litNodes.has(pid)?" lit":""),x:f.x,y:f.y,width:f.w,height:f.h,rx:12}));
    const lbl=el("text",{class:"groupframe-label",x:f.x+12,y:f.y+20},parent.label+" · internals");
    lbl.addEventListener("click",()=>selectNode(pid));worldMap.appendChild(lbl);
    worldMap.appendChild(el("text",{class:"groupframe-id",x:f.x+f.w-34,y:f.y+18},parent.display_id));
    const col=el("text",{class:"collapse",x:f.x+f.w-16,y:f.y+20},"−");
    col.addEventListener("click",()=>{state.expanded[pid]=false;renderMap();});worldMap.appendChild(col);
  }

  const allEdges=[...visibleEdges()];
  for(const pid in state.expanded){if(state.expanded[pid])allEdges.push(...(DOC.expanded_children[pid].edges||[]));}
  allEdges.forEach(e=>{
    const fromN=nodeById(e.from),toN=nodeById(e.to);
    if((fromN&&fromN.resolution==="dismissed")||(toN&&toN.resolution==="dismissed"))return;
    resolveEndpoints(e).forEach(([a,b])=>{
      const[aw,ah]=dims(a),[bw,bh]=dims(b);
      const isLit=litEdges.has(e.id),isAdd=addsE.includes(e.id),isSusp=e.kind==="suspected_influence";
      const g=el("g",{class:"edge"+(e.kind==="async_msg"?" async":"")+(isSusp?" suspect":"")+(isLit?" lit":"")+(dimming&&!isLit?" dim":"")+(isAdd?" diff-add":"")});
      const p=edgePath(a,b,aw,ah,bw,bh);
      g.appendChild(el("path",{class:"hit",d:p.d}));
      g.appendChild(el("path",{class:"vis",d:p.d,"marker-end":isLit?"url(#arrLit)":(isAdd?"url(#arrAdd)":"url(#arr)")}));
      const lab=(isSusp?"? ":"")+(e.label||"");
      if(lab.trim())g.appendChild(el("text",{x:p.mx,y:p.my-7,"text-anchor":"middle"},lab));
      if(e.display_id)g.appendChild(el("text",{class:"eid",x:p.mx,y:p.my+9,"text-anchor":"middle"},e.display_id));
      g.addEventListener("click",ev=>{ev.stopPropagation();showEdgeCrossNav(e);});
      worldMap.appendChild(g);
    });
  });

  const draw=(n,small)=>{
    const[w,h]=dims(n);
    const isLit=litNodes.has(n.id),isSel=state.selected===n.id;
    const isAdd=addsN.includes(n.id),isMod=mods.includes(n.id),isSusp=n.resolution==="suspected";
    const g=el("g",{class:"node"+(isSusp?" suspected":"")+(isLit?" lit":"")+(dimming&&!isLit?" dim":"")+(isSel?" selected":"")+(isAdd?" diff-add":"")+(isMod?" diff-mod":""),transform:`translate(${n.pos.x},${n.pos.y})`});
    const body=el("rect",{class:"body",width:w,height:h,rx:9});
    if(state.heat&&n.metrics&&typeof n.metrics.tangle_score==="number"&&!isSusp){
      body.setAttribute("style",`stroke:${heatColor(n.metrics.tangle_score)};stroke-width:2.4`);
    }
    g.appendChild(body);
    g.appendChild(el("rect",{class:"kbar",x:0,y:0,width:4,height:h,fill:isSusp?"var(--faint)":KIND_COLOR(n.kind),rx:2}));
    g.appendChild(el("text",{class:"label",x:14,y:small?25:24},(isSusp?"? ":"")+n.label));
    if(!small)g.appendChild(el("text",{class:"kind",x:14,y:42,fill:isSusp?"var(--faint)":KIND_COLOR(n.kind)},isSusp?"BLACK BOX · "+n.kind:n.kind.toUpperCase()));
    g.appendChild(el("text",{class:"nid",x:w-8,y:h-7,"text-anchor":"end"},n.display_id||""));
    if(state.heat&&n.metrics&&typeof n.metrics.tangle_score==="number"&&!isSusp)
      g.appendChild(el("text",{class:"difftag",x:w-46,y:14,fill:heatColor(n.metrics.tangle_score)},"♨ "+n.metrics.tangle_score.toFixed(2)));
    if(isAdd)g.appendChild(el("text",{class:"difftag",x:w-42,y:14,fill:"var(--add)"},"+ NEW"));
    if(isMod)g.appendChild(el("text",{class:"difftag",x:w-42,y:14,fill:"var(--mod)"},"~ MOD"));
    if(n.expandable&&!isExpanded(n.id)&&(DOC.expanded_children||{})[n.id]){
      const ex=el("g",{class:"expander",transform:`translate(${w-18},${h-16})`});
      ex.appendChild(el("circle",{r:9}));ex.appendChild(el("text",{x:0,y:4,"text-anchor":"middle"},"+"));
      ex.addEventListener("click",ev=>{ev.stopPropagation();state.expanded[n.id]=true;renderMap();});
      g.appendChild(ex);
    }
    g.addEventListener("click",()=>selectNode(n.id));
    worldMap.appendChild(g);
  };
  visibleNodes().forEach(n=>draw(n,false));
  for(const pid in state.expanded){if(state.expanded[pid])(DOC.expanded_children[pid].nodes||[]).forEach(n=>draw(n,true));}
}

/* ============ SEQUENCE ============ */
const svgSeq=document.getElementById("svgSeq");
const SEQ={llW:150,gap:170,headH:44,topPad:20,rowH:34,leftPad:30};
function seqLayout(flow){
  const fd=flowDiffFor(flow.id);
  const removed=fd?new Set(fd.removed_step_seqs||[]):new Set();
  const rows=[];
  (flow.preface||[]).forEach(a=>rows.push({a,stepIdx:-1,ghost:false}));
  flow.steps.forEach((st,si)=>st.arrows.forEach(a=>rows.push({a,stepIdx:si,ghost:removed.has(st.seq)})));
  const acts=[];const open={};
  const openAct=(id,row)=>{(open[id]=open[id]||[]).push({node:id,start:row,depth:open[id].length,end:null});acts.push(open[id][open[id].length-1]);};
  const closeAct=(id,row)=>{const s=open[id];if(s&&s.length)s.pop().end=row;};
  rows.forEach((r,i)=>{
    const a=r.a;
    if(a.type==="call"){if(!(open[a.from]&&open[a.from].length))openAct(a.from,i-0.4);openAct(a.to,i);}
    else if(a.type==="return"){closeAct(a.from,i);}
    else if(a.type==="async"){if(!(open[a.from]&&open[a.from].length))openAct(a.from,i-0.4);openAct(a.to,i);closeAct(a.to,i+0.6);}
  });
  const last=rows.length;
  for(const id in open)open[id].forEach(x=>{if(x.end===null)x.end=last-0.4;});
  return{rows,acts,fd};
}
function llX(flow,id){return SEQ.leftPad+flow.participants.indexOf(id)*SEQ.gap+SEQ.llW/2;}
function renderSeq(){
  svgSeq.innerHTML="";
  const flow=state.flow;if(!flow)return;
  const{rows,acts,fd}=seqLayout(flow);
  const W=SEQ.leftPad*2+flow.participants.length*SEQ.gap;
  const H=SEQ.topPad+SEQ.headH+30+(rows.length+1)*SEQ.rowH+40;
  svgSeq.setAttribute("viewBox",`0 0 ${W} ${H}`);
  svgSeq.setAttribute("width",W*state.seqZoom);svgSeq.setAttribute("height",H*state.seqZoom);
  const rowY=i=>SEQ.topPad+SEQ.headH+30+i*SEQ.rowH;
  const cur=state.step;
  const curNodes=new Set();
  if(cur>=0)stepNodes(flow.steps[cur]).forEach(id=>curNodes.add(id));
  if(cur>=0){
    const idxs=rows.map((r,i)=>r.stepIdx===cur?i:-1).filter(i=>i>=0);
    if(idxs.length)svgSeq.appendChild(el("rect",{class:"stepband",x:0,y:rowY(idxs[0])-SEQ.rowH*0.55,width:W,height:(idxs[idxs.length-1]-idxs[0]+1)*SEQ.rowH}));
  }
  flow.participants.forEach(id=>{
    const x=llX(flow,id);
    svgSeq.appendChild(el("line",{class:"lifeline",x1:x,y1:SEQ.topPad+SEQ.headH,x2:x,y2:H-20}));
  });
  acts.forEach(a=>{
    const x=llX(flow,a.node)+a.depth*7-6;
    const y1=rowY(a.start)-8,y2=rowY(a.end)+8;
    const lit=cur>=0&&curNodes.has(a.node)&&rows.some((r,i)=>r.stepIdx===cur&&rowY(i)>=y1&&rowY(i)<=y2&&(r.a.from===a.node||r.a.to===a.node));
    svgSeq.appendChild(el("rect",{class:"actbar"+(lit?" lit":""),x,y:y1,width:12,height:Math.max(10,y2-y1),rx:2}));
  });
  flow.participants.forEach(id=>{
    const n=nodeById(id),x=llX(flow,id);
    const g=el("g",{class:"ll-head"+(curNodes.has(id)?" lit":"")});
    g.appendChild(el("rect",{x:x-SEQ.llW/2,y:SEQ.topPad,width:SEQ.llW,height:SEQ.headH,rx:7,stroke:KIND_COLOR(n.kind)}));
    g.appendChild(el("text",{class:"llname",x,y:SEQ.topPad+19,"text-anchor":"middle"},n.label));
    g.appendChild(el("text",{class:"llid",x,y:SEQ.topPad+34,"text-anchor":"middle"},n.display_id+" · "+n.kind));
    g.addEventListener("click",()=>selectNode(id));
    svgSeq.appendChild(g);
  });
  rows.forEach((r,i)=>{
    const a=r.a,y=rowY(i);
    const x1=llX(flow,a.from),x2=llX(flow,a.to);
    const dir=x2>x1?1:-1;
    let cls="sarrow "+a.type+(r.stepIdx<0?" done":(cur<0?"":(r.stepIdx<cur?" done":(r.stepIdx===cur?" lit":" future"))));
    if(r.ghost)cls+=" ghost";
    const g=el("g",{class:cls});
    g.appendChild(el("line",{x1:x1+dir*8,y1:y,x2:x2-dir*10,y2:y}));
    const hx=x2-dir*10;
    g.appendChild(el("path",{d:`M${hx} ${y} l${-dir*9} -4.5 l0 9 z`,fill:a.type==="return"?"none":(a.err?"var(--rem)":"currentColor"),stroke:a.err?"var(--rem)":"#7f92b5","stroke-width":1.2}));
    g.appendChild(el("text",{class:a.err?"err":"",x:(x1+x2)/2,y:y-7,"text-anchor":"middle"},a.label||""));
    g.addEventListener("click",()=>{
      if(r.stepIdx>=0)state.step=r.stepIdx;
      setView("map");syncPlaybar();renderAll();
      if(a.edge){const e=DOC.edges.find(x=>x.id===a.edge);if(e)showEdgeCrossNav(e);}
    });
    svgSeq.appendChild(g);
  });
  if(flow.preface&&flow.preface.length)
    svgSeq.appendChild(el("text",{x:SEQ.leftPad,y:rowY(0)-18,fill:"var(--faint)","font-size":"9px","font-family":"var(--mono)"},"· контекст ·"));
  if(fd&&fd.note){
    svgSeq.appendChild(el("text",{class:"ghostnote",x:SEQ.leftPad,y:H-8},"diff: "+fd.note));
  }
}

/* ============ inspector / cross-nav ============ */
const rp=document.getElementById("rightpanel");
function selectNode(id){
  state.selected=id;renderAll();
  const n=nodeById(id);if(!n)return;
  const mods=modifiedIds();
  const isSusp=n.resolution==="suspected";
  let html=`<h2>Inspector</h2>
    <span class="np-kind" style="color:${isSusp?"var(--rem)":KIND_COLOR(n.kind)};border:1px solid ${isSusp?"var(--rem)":KIND_COLOR(n.kind)}">${isSusp?"BLACK BOX · ":""}${n.kind}</span>
    <span class="np-id">${n.display_id||""} · ${n.id} · ${n.scope||""}</span>
    <div class="np-title">${esc(n.label)}</div>
    <div class="np-sum">${esc(n.summary||"")}</div>`;
  if(n.evidence)html+=`<h2>evidence</h2><div class="np-ev">${esc(n.evidence)}</div>`;
  if(n.metrics){const m=n.metrics;
    html+=`<h2>metrics (deterministic)</h2><div class="metrics">`+
      (m.fan_in!=null?`fan_in ${m.fan_in} · fan_out ${m.fan_out??"?"}<br>`:"")+
      (m.flows_count!=null?`flows_count ${m.flows_count}<br>`:"")+
      (m.change_coupling!=null?`change_coupling ${m.change_coupling}<br>`:"")+
      (m.tangle_score!=null?`tangle_score <b style="color:${heatColor(m.tangle_score)}">${m.tangle_score}</b>`:"")+`</div>`;}
  html+=`<h2>source_refs</h2>`;
  (n.source_refs||[]).forEach(r=>{html+=`<div class="refitem" data-ref="${esc(r)}">${esc(r)}</div>`;});
  if(state.diff&&mods.includes(id)){const d=DOC.diffs.find(d=>d.op==="modify_node"&&d.target===id);
    html+=`<h2>proposed change</h2><div class="diffcard mod"><span class="op">~ MODIFY</span><div class="rat">${esc(d.rationale)}</div></div>`;}
  if(state.diff&&addedNodeIds().includes(id)){const d=DOC.diffs.find(d=>d.op==="add_node"&&d.node.id===id);
    html+=`<h2>proposed change</h2><div class="diffcard"><span class="op">+ ADD</span><div class="rat">${esc(d.rationale)}</div></div>`;}
  html+=`<div id="codeSlot"></div>`;
  rp.innerHTML=html;
  rp.querySelectorAll(".refitem").forEach(x=>x.addEventListener("click",()=>showCode(x.dataset.ref)));
}
function showEdgeCrossNav(e){
  const isSusp=e.kind==="suspected_influence";
  let html=`<h2>Edge ${e.display_id}</h2>
    <div class="np-title" style="font-size:13px">${esc(nodeById(e.from)?.label||e.from)} → ${esc(nodeById(e.to)?.label||e.to)}</div>
    <div class="np-sum">${esc(e.label||"")} · ${e.kind}</div>`;
  if(e.evidence)html+=`<h2>evidence</h2><div class="np-ev">${esc(e.evidence)}</div>`;
  if(!isSusp){
    html+=`<h2>appears in flows</h2>`;
    let found=false;
    DOC.flows.forEach(f=>f.steps.forEach((st,si)=>{
      if(stepEdges(st).includes(e.id)){found=true;
        html+=`<div class="xnav" data-flow="${f.id}" data-step="${si}">▶ ${esc(f.title)} · step ${st.seq}</div>`;}
    }));
    if(!found)html+=`<div class="empty">не бере участі в жодному відомому флоу</div>`;
  }
  rp.innerHTML=html;
  rp.querySelectorAll(".xnav").forEach(x=>x.addEventListener("click",()=>{
    state.flow=DOC.flows.find(f=>f.id===x.dataset.flow);
    state.step=+x.dataset.step;
    document.getElementById("tabSeq").disabled=false;
    renderFlows();setView("seq");syncPlaybar();renderAll();
  }));
}
function showCode(ref){
  const cs=DOC.code_snippets||{};
  let key=cs[ref]?ref:Object.keys(cs).find(k=>ref.includes(k.split(/\.(java|ts|py|php)/)[0])||k.includes(ref.split("/").pop().split(/\.(java|ts|py|php)/)[0]));
  const snip=key?cs[key]:null;
  const body=snip?snip.text.split("\n").map((l,i)=>(snip.hl||[]).includes(i)?`<span class="hl">${esc(l)||" "}</span>`:esc(l)).join("\n"):"// немає снапшоту; реальна версія читає файл з репо";
  const block=`<h2>code · ${esc(key||ref)}</h2><pre class="code">${body}</pre>`;
  const slot=document.getElementById("codeSlot");
  if(slot)slot.innerHTML=block;else rp.innerHTML=`<h2>Inspector</h2>`+block;
}

/* ============ sidebar ============ */
const flowList=document.getElementById("flowList"),flowDetail=document.getElementById("flowDetail");
function renderFlows(){
  flowList.innerHTML="";
  DOC.flows.forEach(f=>{
    const d=document.createElement("div");
    d.className="flow"+(f.kind==="bug_path"?" bug":"")+(state.flow&&state.flow.id===f.id?" active":"");
    d.innerHTML=`<div class="name">${esc(f.title)}</div><div class="kindtag">${f.kind}${f.verified_by?" · "+f.verified_by:""}</div>`;
    d.addEventListener("click",()=>{
      state.flow=f;state.step=-1;stopAuto();hidePlaybar();
      document.getElementById("tabSeq").disabled=false;
      setView("seq");renderFlows();renderAll();
    });
    flowList.appendChild(d);
  });
  if(state.flow){
    flowDetail.innerHTML=`<div class="flowdesc">${esc(state.flow.description||"")}</div>
      <div class="btnrow"><button id="btnPlay" class="primary">▶ playback</button></div>`;
    document.getElementById("btnPlay").addEventListener("click",()=>{state.step=0;syncPlaybar();renderAll();});
  } else flowDetail.innerHTML="";
}
function renderBBs(){
  const boxes=DOC.nodes.filter(n=>n.resolution==="suspected");
  const head=document.getElementById("bbHead"),list=document.getElementById("bbList");
  head.style.display=boxes.length?"block":"none";
  list.innerHTML=boxes.map(b=>`<div class="bb" data-id="${b.id}">
    <div class="t">${b.display_id} · ${esc(b.label)}${b.relevance?" · "+b.relevance:""}</div>
    <div class="e">${esc(b.evidence||"")}</div></div>`).join("");
  list.querySelectorAll(".bb").forEach(x=>x.addEventListener("click",()=>{setView("map");selectNode(x.dataset.id);}));
}

/* ============ playback ============ */
const pb=document.getElementById("playbar");
function syncPlaybar(){
  if(!state.flow||state.step<0){hidePlaybar();return;}
  const f=state.flow,st=f.steps[state.step];
  pb.classList.add("show");
  document.getElementById("pbSeq").textContent=`step ${st.seq}/${f.steps.length}`;
  document.getElementById("pbExpl").textContent=st.explanation;
  const ref=document.getElementById("pbRef");
  ref.textContent=st.code_ref||"";
  ref.onclick=()=>{const fn=stepNodes(st)[0];if(fn)selectNode(fn);if(st.code_ref)showCode(st.code_ref);};
  document.getElementById("pbDots").innerHTML=f.steps.map((_,i)=>`<div class="dot${i<=state.step?" done":""}"></div>`).join("");
  document.getElementById("pbPrev").disabled=state.step===0;
  document.getElementById("pbNext").disabled=state.step===f.steps.length-1;
}
function hidePlaybar(){pb.classList.remove("show");}
document.getElementById("pbNext").addEventListener("click",()=>{if(state.step<state.flow.steps.length-1){state.step++;syncPlaybar();renderAll();}});
document.getElementById("pbPrev").addEventListener("click",()=>{if(state.step>0){state.step--;syncPlaybar();renderAll();}});
document.getElementById("pbClose").addEventListener("click",()=>{stopAuto();state.step=-1;hidePlaybar();renderAll();});
document.getElementById("pbAuto").addEventListener("click",function(){
  if(state.auto){stopAuto();return;}
  this.textContent="⏸ pause";
  state.auto=setInterval(()=>{if(state.step<state.flow.steps.length-1){state.step++;syncPlaybar();renderAll();}else stopAuto();},3000);
});
function stopAuto(){if(state.auto){clearInterval(state.auto);state.auto=null;}const b=document.getElementById("pbAuto");if(b)b.textContent="▶ auto";}

/* ============ view tabs & zoom ============ */
function setView(v){
  state.view=v;
  document.getElementById("tabMap").classList.toggle("active",v==="map");
  document.getElementById("tabSeq").classList.toggle("active",v==="seq");
  document.getElementById("paneMap").classList.toggle("active",v==="map");
  document.getElementById("paneSeq").classList.toggle("active",v==="seq");
  document.getElementById("seqZoomCtl").style.display=v==="seq"?"flex":"none";
}
document.getElementById("tabMap").addEventListener("click",()=>{setView("map");renderAll();});
document.getElementById("tabSeq").addEventListener("click",()=>{if(state.flow){setView("seq");renderAll();}});
document.getElementById("zIn").addEventListener("click",()=>{state.seqZoom=Math.min(3,state.seqZoom*1.2);renderSeq();});
document.getElementById("zOut").addEventListener("click",()=>{state.seqZoom=Math.max(.35,state.seqZoom/1.2);renderSeq();});
document.getElementById("zReset").addEventListener("click",()=>{state.seqZoom=1;renderSeq();});
document.getElementById("seqScroll").addEventListener("wheel",e=>{
  if(!e.ctrlKey)return;e.preventDefault();
  state.seqZoom=Math.min(3,Math.max(.35,state.seqZoom*(e.deltaY<0?1.1:0.9)));renderSeq();
},{passive:false});

/* ============ toggles ============ */
const dt=document.getElementById("diffToggle"),ht=document.getElementById("heatToggle");
function toggleDiff(){
  state.diff=!state.diff;
  dt.classList.toggle("on",state.diff);dt.setAttribute("aria-checked",state.diff);
  renderAll();
  if(state.diff&&DOC.diffs){
    rp.innerHTML=`<h2>Proposed changes</h2>`+DOC.diffs.map(d=>{
      const isMod=d.op.startsWith("modify");
      const label=d.op==="add_node"?("+ ADD "+d.node.label+" ("+d.node.display_id+")"):d.op==="add_edge"?("+ EDGE "+d.edge.display_id):((d.op.startsWith("remove")?"− ":"~ ")+d.op.toUpperCase()+" "+(d.target||""));
      return `<div class="diffcard${isMod?" mod":""}"><span class="op">${esc(label)}</span><div class="rat">${esc(d.rationale)}</div></div>`;}).join("")+
      (DOC.advisory&&DOC.advisory.summary?`<h2>advisory</h2><div class="np-sum">${esc(DOC.advisory.summary)}</div>`:"")+
      (DOC.flow_diffs?`<h2>flow diffs</h2>`+DOC.flow_diffs.map(fd=>`<div class="diffcard mod"><span class="op">~ FLOW ${esc(fd.flow_id)}</span><div class="rat">${esc(fd.note||"")} ${fd.removed_step_seqs?("· зникають степи: "+fd.removed_step_seqs.join(", ")):""}</div></div>`).join(""):"");
  }
}
function toggleHeat(){
  state.heat=!state.heat;
  ht.classList.toggle("on",state.heat);ht.setAttribute("aria-checked",state.heat);
  renderAll();
  if(state.heat&&DOC.advisory&&DOC.advisory.hotspots){
    rp.innerHTML=`<h2>Hotspots (advisory over metrics)</h2>`+DOC.advisory.hotspots.map(h=>
      `<div class="diffcard mod"><span class="op">♨ ${esc(h.node)}</span><div class="rat">${esc(h.recommendation)}</div></div>`).join("");
  }
}
dt.addEventListener("click",toggleDiff);
dt.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();toggleDiff();}});
ht.addEventListener("click",toggleHeat);
ht.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();toggleHeat();}});

/* ============ map pan & zoom ============ */
let view={x:0,y:0,k:1},drag=null;
function applyView(){worldMap.setAttribute("transform",`translate(${view.x},${view.y}) scale(${view.k})`);}
svgMap.addEventListener("mousedown",e=>{if(e.target===svgMap){drag={x:e.clientX,y:e.clientY};svgMap.classList.add("panning");}});
window.addEventListener("mousemove",e=>{if(drag){view.x+=e.clientX-drag.x;view.y+=e.clientY-drag.y;drag={x:e.clientX,y:e.clientY};applyView();}});
window.addEventListener("mouseup",()=>{drag=null;svgMap.classList.remove("panning");});
svgMap.addEventListener("wheel",e=>{e.preventDefault();const f=e.deltaY<0?1.1:0.9;view.k=Math.min(2.5,Math.max(.4,view.k*f));applyView();},{passive:false});

/* ============ init ============ */
function renderAll(){renderMap();renderSeq();}
function init(){
  document.getElementById("metaTitle").textContent=DOC.meta.title;
  document.getElementById("metaStamp").textContent=(DOC.meta.intent?DOC.meta.intent+" · ":"")+(DOC.meta.commit_hash?DOC.meta.commit_hash.slice(0,8):"")+(DOC.meta.generated_at?" · "+DOC.meta.generated_at.slice(0,16).replace("T"," "):"");
  document.getElementById("hintBox").innerHTML=
    "display_id (N2, E3, BB1) — спільна система координат з агентом: «поясни E3», «дослідь BB1».<br>"+
    (DOC.meta.scan_coverage?("scanned: "+(DOC.meta.scan_coverage.scanned_sources||[]).join(", ")+"<br>not scanned: "+(DOC.meta.scan_coverage.not_scanned||[]).join(", ")):"");
  renderFlows();renderBBs();renderAll();
}
boot();
</script>
